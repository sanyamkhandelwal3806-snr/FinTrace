<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - FINTRACE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-shell">

    <aside class="sidebar">
      <a href="/dashboard.html" class="sidebar-brand">₹</a>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="sidebar-icon active" title="Dashboard"><i class="bi bi-grid-1x2-fill"></i></a>
        <a href="/transactions.html" class="sidebar-icon" title="Transactions"><i class="bi bi-arrow-left-right"></i></a>
        <a href="/analytics.html" class="sidebar-icon" title="Analytics"><i class="bi bi-pie-chart-fill"></i></a>
      </nav>
      <button class="sidebar-icon" title="Log out" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <div class="search-pill">
          <i class="bi bi-search"></i>
          <input type="text" id="topSearch" placeholder="Search transactions..." />
          <kbd>Enter ↵</kbd>
        </div>
        <div class="topbar-right">
          <button class="icon-toggle" id="themeToggle"><i class="bi bi-sun"></i></button>
          <div class="avatar-chip">
            <div class="avatar-circle" id="avatarInitial">?</div>
            <span class="uname" id="navUser"></span>
          </div>
        </div>
      </header>

      <main class="page-content">
        <div class="page-greeting animate-in">
          <div class="hi" id="greetingTime">Good morning</div>
          <h1 id="greetingName">Welcome back</h1>
        </div>

        <div class="page-header" style="margin-top:-8px;">
          <div class="sub" id="monthLabel"></div>
          <input type="month" id="monthPicker" />
        </div>

        <div class="dash-top-grid">
          <!-- Hero balance card -->
          <div class="card hero-card lift animate-in" style="--delay:0.05s">
            <div class="hero-top">
              <div>
                <div class="card-label">Total balance</div>
                <div class="hero-balance-row">
                  <span class="hero-balance mono" id="heroBalance">₹0</span>
                  <button class="hero-eye" id="eyeToggle" title="Hide balance"><i class="bi bi-eye"></i></button>
                </div>
              </div>
              <span class="change-tag" id="changeTag"></span>
            </div>

            <div class="hero-rows">
              <div class="hero-row">
                <span class="hero-row-label"><span class="dot" style="background:var(--positive)"></span>Income</span>
                <span class="hero-row-value positive" id="heroIncome">₹0</span>
              </div>
              <div class="hero-row">
                <span class="hero-row-label"><span class="dot" style="background:var(--negative)"></span>Expenses</span>
                <span class="hero-row-value negative" id="heroExpense">₹0</span>
              </div>
              <div class="hero-row goal-row">
                <span class="hero-row-label"><span class="dot" style="background:var(--accent)"></span>Savings goal</span>
                <span class="hero-row-value" id="heroGoal">₹0</span>
              </div>
            </div>
          </div>

          <!-- Stat + chart panel -->
          <div class="card lift animate-in" style="--delay:0.1s">
            <div class="stat-mini-grid">
              <div class="stat-mini">
                <div class="card-label">Income</div>
                <div class="stat-mini-value-row">
                  <span class="stat-mini-value mono" id="statIncome">₹0</span>
                </div>
                <div class="sparkline" id="sparkIncome"></div>
              </div>
              <div class="stat-mini">
                <div class="card-label">Expenses</div>
                <div class="stat-mini-value-row">
                  <span class="stat-mini-value mono" id="statExpense">₹0</span>
                </div>
                <div class="sparkline" id="sparkExpense"></div>
              </div>
              <div class="stat-mini">
                <div class="card-label">Savings rate</div>
                <div class="stat-mini-value-row">
                  <span class="stat-mini-value mono" id="statSavingsRate">0%</span>
                </div>
                <div class="sparkline" id="sparkSavings"></div>
              </div>
            </div>
            <div class="chart-wrap">
              <canvas id="historyChart"></canvas>
            </div>
          </div>
        </div>

        <div class="dash-bottom-grid">
          <!-- Goal ledger card -->
          <div class="card lift animate-in" style="--delay:0.15s">
            <div class="goal-header">
              <h2 style="font-size:16px;margin:0;">Monthly savings goal</h2>
              <span class="goal-status" id="goalStatus"></span>
            </div>
            <div class="ledger-scale" id="ledgerScale">
              <div class="ledger-fill" id="ledgerFill"></div>
            </div>
            <div class="goal-figures">
              <span id="goalSavedLabel">Saved: ₹0</span>
              <span id="goalTargetLabel">Goal: ₹0</span>
            </div>
            <div class="goal-edit-row">
              <input type="number" id="goalInput" placeholder="Set monthly savings goal (₹)" min="0" />
              <button class="btn btn-secondary" id="saveGoalBtn"><i class="bi bi-check2"></i></button>
            </div>
            <div class="goal-insight" id="goalInsight"></div>
          </div>

          <!-- Recent transactions -->
          <div class="card lift animate-in" style="--delay:0.2s">
            <div class="page-header" style="margin-bottom:10px;">
              <h2 style="font-size:16px;margin:0;">Recent transactions</h2>
              <a href="/transactions.html" class="muted" style="font-size:13px;text-decoration:none;">View all <i class="bi bi-arrow-right"></i></a>
            </div>
            <div class="tx-list" id="recentList"></div>
            <div class="empty-state" id="emptyState" style="display:none;">
              <i class="bi bi-receipt"></i>
              <div class="big">No transactions yet</div>
              <div>Add your first one below.</div>
            </div>
          </div>
        </div>

        <!-- Quick add -->
        <div class="card lift animate-in" style="--delay:0.25s; margin-top:16px;">
          <h2 style="font-size:16px;">Add a transaction</h2>
          <form id="quickAddForm">
            <div class="tx-form-grid" style="margin-top:12px;">
              <div class="type-toggle" id="typeToggle">
                <button type="button" class="active" data-type="expense">Expense</button>
                <button type="button" data-type="income">Income</button>
              </div>
              <select id="categorySelect" required></select>
              <input type="number" id="amountInput" placeholder="Amount" min="0.01" step="0.01" required />
              <input type="date" id="dateInput" required />
              <input type="text" id="noteInput" placeholder="Note (optional)" />
              <button type="submit" class="btn"><i class="bi bi-plus-lg"></i> Add</button>
            </div>
            <p class="error-text" id="formError"></p>
          </form>
        </div>
      </main>
    </div>
  </div>

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/shared.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
